project:
  title: "Traffic Light FSM"
  author: "Divyanshu Jaiswal"
  discord: ""
  description: "A simple traffic light controller using FSM"
  language: "Verilog"
  clock_hz: 10000000

  # Source files
  source_files:
    - project.v

  # Top module must match the Verilog module name
  top_module: "tt_um_traffic_light"

  # Pinout
  pinout:
    ui[0]: sensor_input
    ui[1]: ""
    ui[2]: ""
    ui[3]: ""
    ui[4]: ""
    ui[5]: ""
    ui[6]: ""
    ui[7]: ""

    uo[0]: main_green
    uo[1]: main_yellow
    uo[2]: main_red
    uo[3]: side_green
    uo[4]: side_yellow
    uo[5]: side_red
    uo[6]: ""
    uo[7]: ""

    uio[0]: timer_0
    uio[1]: timer_1
    uio[2]: timer_2
    uio[3]: timer_3
    uio[4]: ""
    uio[5]: ""
    uio[6]: ""
    uio[7]: ""
